# MacBook Pro 16" — 2D top-down CFD configuration.
#
# Coordinate system: origin at bottom-left of domain (top-down view).
# x increases toward right side of laptop, y increases toward rear hinge.
# All dimensions in SI unless suffix says otherwise (_mm = millimeters).

domain:
  length_m: 0.355
  height_m: 0.245
  nx: 260
  ny: 180

  # 1D out-of-plane closure: q_volumetric = q_watts / (area_2d * depth).
  # The depth value is the "effective slab thickness" that would emit the
  # same heat per unit area as the real 3D component.
  #   - active zone: chips/heat sinks are ~5–20 mm thick → 0.020 m
  #   - battery zone: cells stack ~10 mm but spread laterally → 0.045 m
  depth_closure:
    active_zone_m: 0.020
    battery_zone_m: 0.045
    zone_split_y_m: 0.120

fluid:
  rho_kg_m3: 1.109
  mu_pa_s: 1.96e-5
  k_air_w_mk: 0.02756
  cp_j_kgk: 1007.0
  # Battery zone has aluminum chassis in thermal contact — model with
  # a modest bulk-conductivity boost.
  # Effective bulk conductivity in the battery half: aluminum chassis is the
  # primary heat path to the bottom case. Calibrated so battery max ≈ 40 °C
  # under steady load matches the measured range (38–45 °C).
  k_chassis_battery_w_mk: 0.25
  # Effective bulk conductivity in the active half: metal mounting frame
  # and PCB foil that carry heat between SoC, RAM, vapor chambers, and
  # the bottom case. Calibrated so SoC sees a reasonable conductive path
  # to the fan exhaust region.
  k_chassis_active_w_mk: 3.0

boundary_conditions:
  wall_temperature_c: 28.0
  inlet_temperature_c: 25.0
  inlet_velocity_m_s: 1.2
  # Inlet is the bottom-case vent line viewed top-down.
  inlet_y_m: 0.120
  inlet_x_range_m: [0.080, 0.275]
  # Rear-hinge exhaust bands on the top wall.
  outlet_bands_x_m:
    - [0.080, 0.168]
    - [0.187, 0.275]

fans:
  velocity_m_s: 1.2

turbulence:
  model: mixing_length       # "none" or "mixing_length"
  mixing_length_m: 0.004      # ~2% of channel height
  nu_t_max_ratio: 80.0        # cap nu_t / nu (was 200 — cap was saturating)

solver:
  max_iterations: 3000
  tolerance: 1.0e-4           # on max |u - u_prev| and div ratio
  cfl: 0.35
  pressure_relax: 0.8
  momentum_relax: 0.7
  brinkman_penalty_per_s: 1.0e5
  log_every: 100

# Components: (x0, x1) / (y0, y1) in mm, q in W, k in W/(m·K).
# Boxes are validated non-overlapping at load time.
# Components in the air-flow plane (SoC, RAM, fans, vapor chambers) block
# 2D momentum. Components physically below the air plane (logic board,
# batteries, speakers, ports, SSD) only emit heat — they should not act as
# obstacles in the top-down flow model.
components:
  # SoC die is ~3 mm thick — use per-component override so its q_volumetric
  # reflects a realistic chip density (rather than the 20 mm zone default).
  - { name: SoC,         x_mm: [155, 186], y_mm: [158, 182], q_w: 15.0, k_w_mk:  150, depth_m: 0.003 }
  - { name: RAM_L,       x_mm: [133, 153], y_mm: [162, 178], q_w:  2.0, k_w_mk:  150 }
  - { name: RAM_R,       x_mm: [188, 208], y_mm: [162, 178], q_w:  2.0, k_w_mk:  150 }
  - { name: Fan_L,       x_mm: [ 82, 131], y_mm: [158, 218], q_w:  0.5, k_w_mk:   50, is_fan: true }
  - { name: Fan_R,       x_mm: [210, 260], y_mm: [158, 218], q_w:  0.5, k_w_mk:   50, is_fan: true }
  - { name: VC_L,        x_mm: [133, 155], y_mm: [182, 218], q_w:  0.0, k_w_mk: 2000 }
  - { name: VC_R,        x_mm: [186, 208], y_mm: [182, 218], q_w:  0.0, k_w_mk: 2000 }
  - { name: VC_top,      x_mm: [133, 208], y_mm: [218, 224], q_w:  0.0, k_w_mk: 2000 }
  - { name: SSD_L,       x_mm: [ 32,  62], y_mm: [140, 155], q_w:  0.4, k_w_mk:  150, blocks_flow: false }
  - { name: SSD_R,       x_mm: [293, 323], y_mm: [140, 155], q_w:  0.4, k_w_mk:  150, blocks_flow: false }
  - { name: TB_L,        x_mm: [  5,  25], y_mm: [155, 175], q_w:  0.8, k_w_mk:  150, blocks_flow: false }
  - { name: TB_R,        x_mm: [330, 350], y_mm: [155, 175], q_w:  0.8, k_w_mk:  150, blocks_flow: false }
  - { name: PowerCtrl,   x_mm: [268, 290], y_mm: [158, 175], q_w:  1.0, k_w_mk:  150, blocks_flow: false }
  - { name: LogicBoard,  x_mm: [ 82, 260], y_mm: [122, 157], q_w:  0.8, k_w_mk:   80, blocks_flow: false }
  - { name: Bat_A1,      x_mm: [ 42, 110], y_mm: [ 78, 118], q_w:  1.2, k_w_mk:    5, blocks_flow: false }
  - { name: Bat_A2,      x_mm: [ 42, 110], y_mm: [ 22,  76], q_w:  1.2, k_w_mk:    5, blocks_flow: false }
  - { name: Bat_B1,      x_mm: [118, 198], y_mm: [ 22, 118], q_w:  2.0, k_w_mk:    5, blocks_flow: false }
  - { name: Bat_B2,      x_mm: [200, 250], y_mm: [ 22, 118], q_w:  2.0, k_w_mk:    5, blocks_flow: false }
  - { name: Bat_C1,      x_mm: [252, 318], y_mm: [ 78, 118], q_w:  1.2, k_w_mk:    5, blocks_flow: false }
  - { name: Bat_C2,      x_mm: [252, 318], y_mm: [ 22,  76], q_w:  1.2, k_w_mk:    5, blocks_flow: false }
  - { name: Speaker_L,   x_mm: [  5,  30], y_mm: [ 10, 110], q_w:  0.2, k_w_mk:   10, blocks_flow: false }
  - { name: Speaker_R,   x_mm: [325, 350], y_mm: [ 10, 110], q_w:  0.2, k_w_mk:   10, blocks_flow: false }

# Validation reference points (real MacBook Pro 16" 2019 thermal data).
# The validation harness checks simulated values lie within [min, max].
validation:
  soc_mean_c:       [80, 100]
  battery_max_c:    [38, 45]
  palm_mean_c:      [29, 36]
  exhaust_mean_c:   [42, 60]
  # In the top-down view, the palm rest is the front edge of the laptop
  # (small y), in the keyboard footprint x range. Keep clear of speakers
  # and batteries.
  palm_rest_region:
    x_m: [0.110, 0.245]
    y_m: [0.005, 0.020]
