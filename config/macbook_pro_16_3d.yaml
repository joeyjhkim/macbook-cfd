# MacBook Pro 16" — 3D CFD configuration.
#
# Heat path: SoC → VC_center (above die) → VC_L / VC_R (lateral)
# → VC_exhaust (fin-stack in exhaust duct) → rear outlet.

domain:
  length_x_m: 0.355
  length_y_m: 0.245
  length_z_m: 0.016
  nx: 90
  ny: 62
  nz: 16

fluid:
  rho_kg_m3: 1.109
  mu_pa_s: 1.96e-5
  k_air_w_mk: 0.02756
  cp_j_kgk: 1007.0
  # Near-air in the active zone forces heat through the resolved VC chain
  # rather than leaking diffusely. Battery zone gets modest boost from
  # chassis aluminum contact.
  k_chassis_active_w_mk: 0.035
  k_chassis_battery_w_mk: 0.25
  chassis_split_z_m: 0.010

boundary_conditions:
  bottom_wall_temperature_c: 34.0
  ambient_temperature_c: 25.0
  # Real bottom-case vent is a narrow slit (~4 mm deep) just below the
  # logic board. In 3D this is a patch on the z=0 face.
  inlet:
    x_m: [0.080, 0.275]
    y_m: [0.118, 0.122]
    velocity_m_s: 1.0
    temperature_c: 25.0
  outlets:
    - { x_m: [0.080, 0.168], z_m: [0.006, 0.014] }
    - { x_m: [0.187, 0.275], z_m: [0.006, 0.014] }

fans:
  velocity_m_s: 2.5

turbulence:
  model: none
  mixing_length_m: 0.003
  nu_t_max_ratio: 80.0

solver:
  max_iterations: 1500
  tolerance: 1.0e-3
  cfl: 0.30
  pressure_relax: 0.8
  momentum_relax: 0.6
  brinkman_penalty_per_s: 1.0e5
  pressure_cg_tol: 1.0e-6
  pressure_cg_maxiter: 300
  log_every: 100

components:
  # --- vapor chamber + heatsink (heat highway from SoC to exhaust) ---
  # TIM: thermal interface material (paste + IHS + spreader). 1-cell-thick
  # layer above SoC with calibrated k to reproduce the real R_jc ≈ 3 K/W
  # from die to vapor chamber.  k = t / (R · A) = 1e-3 / (3 · 7.4e-4) ≈ 0.45
  - { name: TIM,          x_mm: [155, 186], y_mm: [158, 182], z_mm: [11, 12], q_w: 0.0, k_w_mk: 0.14 }
  # VC_center: slab above TIM, connects to lateral VCs + exhaust.
  - { name: VC_center,   x_mm: [131, 210], y_mm: [158, 218], z_mm: [12, 14], q_w: 0.0, k_w_mk: 2000 }
  # VC_L / VC_R: lateral arms, run from chip area down to fan-exhaust level.
  - { name: VC_L,        x_mm: [131, 155], y_mm: [182, 218], z_mm: [ 8, 12], q_w: 0.0, k_w_mk: 2000 }
  - { name: VC_R,        x_mm: [186, 210], y_mm: [182, 218], z_mm: [ 8, 12], q_w: 0.0, k_w_mk: 2000 }
  # VC_exhaust: homogenized fin-stack in exhaust duct. blocks_flow=false
  # lets air advect through; k=500 models dense aluminum fin stack.
  # k=3 models the air-side thermal resistance of the fin channels:
  # real fin HTC ≈ 50 W/m²K, grid spacing ~4mm → k_eff ≈ h·dx ≈ 0.2.
  # Raised slightly to account for lateral conduction through the fins.
  - { name: VC_exhaust,  x_mm: [ 95, 260], y_mm: [218, 234], z_mm: [ 4, 12], q_w: 0.0, k_w_mk:    3, blocks_flow: false }

  # --- active components ---
  - { name: SoC,         x_mm: [155, 186], y_mm: [158, 182], z_mm: [ 7, 11], q_w: 15.0, k_w_mk:  150 }
  - { name: RAM_L,       x_mm: [133, 153], y_mm: [162, 178], z_mm: [ 7, 10], q_w:  2.0, k_w_mk:  150 }
  - { name: RAM_R,       x_mm: [188, 208], y_mm: [162, 178], z_mm: [ 7, 10], q_w:  2.0, k_w_mk:  150 }
  - { name: Fan_L,       x_mm: [ 82, 131], y_mm: [158, 218], z_mm: [ 4, 14], q_w:  0.5, k_w_mk:   50, is_fan: true, fan_direction: "+y" }
  - { name: Fan_R,       x_mm: [210, 260], y_mm: [158, 218], z_mm: [ 4, 14], q_w:  0.5, k_w_mk:   50, is_fan: true, fan_direction: "+y" }
  - { name: SSD_L,       x_mm: [ 32,  62], y_mm: [140, 155], z_mm: [ 5,  8], q_w:  0.4, k_w_mk:  150 }
  - { name: SSD_R,       x_mm: [293, 323], y_mm: [140, 155], z_mm: [ 5,  8], q_w:  0.4, k_w_mk:  150 }
  - { name: LogicBoard,  x_mm: [ 82, 260], y_mm: [122, 157], z_mm: [ 6,  8], q_w:  0.8, k_w_mk:   80 }

  # --- batteries ---
  - { name: Bat_A1,      x_mm: [ 42, 110], y_mm: [ 78, 118], z_mm: [ 0, 10], q_w:  1.2, k_w_mk:    5 }
  - { name: Bat_A2,      x_mm: [ 42, 110], y_mm: [ 22,  76], z_mm: [ 0, 10], q_w:  1.2, k_w_mk:    5 }
  - { name: Bat_B1,      x_mm: [118, 198], y_mm: [ 22, 118], z_mm: [ 0, 10], q_w:  2.0, k_w_mk:    5 }
  - { name: Bat_B2,      x_mm: [200, 250], y_mm: [ 22, 118], z_mm: [ 0, 10], q_w:  2.0, k_w_mk:    5 }
  - { name: Bat_C1,      x_mm: [252, 318], y_mm: [ 78, 118], z_mm: [ 0, 10], q_w:  1.2, k_w_mk:    5 }
  - { name: Bat_C2,      x_mm: [252, 318], y_mm: [ 22,  76], z_mm: [ 0, 10], q_w:  1.2, k_w_mk:    5 }
  - { name: Speaker_L,   x_mm: [  5,  30], y_mm: [ 10, 110], z_mm: [ 0, 14], q_w:  0.2, k_w_mk:   10 }
  - { name: Speaker_R,   x_mm: [325, 350], y_mm: [ 10, 110], z_mm: [ 0, 14], q_w:  0.2, k_w_mk:   10 }

validation:
  soc_mean_c:     [80, 105]
  battery_max_c:  [32, 48]
  palm_mean_c:    [26, 40]
  exhaust_mean_c: [38, 65]
  palm_rest_region:
    x_m: [0.110, 0.245]
    y_m: [0.005, 0.020]
